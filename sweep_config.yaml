# Fixed dataset path
dataset_path: ImagenetHighResolution

# Fixed model settings
device: mps
epochs: 1
input_image_size: 32
output_image_size: 512

# 16x upscale = 4 up stages, so 5 entries. Channels taper toward high
# resolution to keep 512px activations affordable.
embedding_dim: "3 256 256 128 64"
# Sweep dimensions
# batch sizes reduced from 8/16: 512px output uses ~4x the memory of 256px
batch_size:
  - 8
  - 16

lr: 
  - 0.0001
  - 0.0003
  - 0.001

min_lr: 0.00001
weight_decay: 0.001

# Optional W&B logging. Set both values to enable logging.
project: null
entity: null
